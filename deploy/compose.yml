services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BITCOIN_RPC_HOST: 127.0.0.1
      BITCOIN_RPC_PORT: ${BITCOIN_RPC_PORT:-38332}
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER:-ocdn}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD}
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-signet}
      PORTAL_PRIVKEY: ${PORTAL_PRIVKEY}
      MAX_FEE_RATE: ${MAX_FEE_RATE:-100}
      API_WRITE_KEY: ${API_WRITE_KEY:-}
    deploy:
      resources:
        limits:
          memory: 1G

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  caddy_data:
  caddy_config:
